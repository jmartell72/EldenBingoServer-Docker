name: docker-ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Restore
        run: dotnet restore ./EldenBingo.sln

      - name: Build
        run: dotnet build ./EldenBingo.sln -c Release --no-restore

      - name: Publish standalone server
        run: dotnet publish ./EldenBingoServerStandalone/EldenBingoServerStandalone.csproj -c Release -o ./artifacts/publish --no-build

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: eldenbingo-server-publish
          path: artifacts/publish

  docker:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner
        id: repo
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ghcr.io/${{ steps.repo.outputs.owner }}/eldenbingo-server:pr-${{ github.event.pull_request.number }}

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner }}/eldenbingo-server:latest
            ghcr.io/${{ steps.repo.outputs.owner }}/eldenbingo-server:${{ github.sha }}
